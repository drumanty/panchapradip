<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanchaPradip</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for clean, vector icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-white text-gray-900 flex flex-col min-h-screen">

    <!-- Header / Navigation -->
    <header class="border-b border-gray-100 sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between gap-4">
            
            <!-- Logo Image & Nav Links -->
            <div class="flex items-center gap-12">
                <a href="#" class="flex items-center">
                    <!-- Cleaned up inline positioning styles to use proper Tailwind classes -->
                    <img src="Pancha Pradip Logo.jpg" alt="PanchaPradip Logo" class="h-12 w-auto object-contain" style="width: 100px; height: 100px; margin-top: 10px; margin-left: 300px;">
                </a>
            </div>

         

        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-6 py-12 flex-grow">
        
        <!-- Hero Title Section -->
        <section class="text-center max-w-2xl mx-auto mb-16">
            <h1 class="text-4xl md:text-5xl font-bold text-[#F59E0B] tracking-tight mb-4">
                Premium Incense & Fragrance Collection 
            </h1>
            <p class="text-gray-600 text-lg leading-relaxed font-normal">
                Discover our latest collection of premium incense and fragrance sticks &mdash; quality, aroma, and craftsmanship in every piece.
            </p>
        </section>

        <!-- Product Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Card 1 -->
            <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col">
                <!-- Changed aspect-square to aspect-[3/4] for a vertical layout, added p-4 padding -->
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden group p-4 flex items-center justify-center">
                    <!-- Changed object-cover to object-contain so nothing gets cut off -->
                    <img src="madmax.jpg" alt="Volt Edge" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                
            </div>

            <!-- Card 2 -->
            <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col">
                <!-- Changed aspect-square to aspect-[3/4] for a vertical layout, added p-4 padding -->
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden group p-4 flex items-center justify-center">
                    <!-- Changed object-cover to object-contain so nothing gets cut off -->
                    <img src="fresheasy.jpg" alt="Zenith Flow" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                
            </div>

            <!-- Card 3 -->
            <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col">
                <!-- Changed aspect-square to aspect-[3/4] for a vertical layout, added p-4 padding -->
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden group p-4 flex items-center justify-center">
                    <!-- Changed object-cover to object-contain so nothing gets cut off -->
                    <img src="zeedblue.jpg" alt="Street Vibe Low" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                
            </div>

        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Card 1 -->
            <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col">
                <!-- Changed aspect-square to aspect-[3/4] for a vertical layout, added p-4 padding -->
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden group p-4 flex items-center justify-center">
                    <!-- Changed object-cover to object-contain so nothing gets cut off -->
                    <img src="moksh.jpg" alt="Volt Edge" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                
            </div>

            <!-- Card 2 -->
            <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col">
                <!-- Changed aspect-square to aspect-[3/4] for a vertical layout, added p-4 padding -->
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden group p-4 flex items-center justify-center">
                    <!-- Changed object-cover to object-contain so nothing gets cut off -->
                    <img src="baul.jpg" alt="Zenith Flow" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                
            </div>

            <!-- Card 3 -->
            <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm flex flex-col">
                <!-- Changed aspect-square to aspect-[3/4] for a vertical layout, added p-4 padding -->
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden group p-4 flex items-center justify-center">
                    <!-- Changed object-cover to object-contain so nothing gets cut off -->
                    <img src="sanskar.jpg" alt="Street Vibe Low" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                
            </div>

        </section>
    </main>

    <!-- Footer Section -->
    <footer class="bg-gray-50 border-t border-gray-100 mt-auto">
        <div class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row items-center justify-between gap-6">
            
            <!-- Footer Logo Image -->
            <div class="flex items-center">
                <img src="Pancha Pradip Logo.jpg" alt="PanchaPradip Logo Footer" class="h-8 w-auto object-contain grayscale opacity-75 hover:grayscale-0 hover:opacity-100 transition-all">
            </div>

            

            <!-- Copyright info -->
            <p class="text-sm text-gray-400">
                &copy; 2026 rumusolution. All rights reserved.
            </p>

        </div>
    </footer>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
